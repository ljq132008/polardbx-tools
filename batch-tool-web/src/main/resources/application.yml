server:
  port: 8080

spring:
  application:
    name: batch-tool-web
  
  datasource:
    url: jdbc:mysql://localhost:3306/batch_tool_web?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.alibaba.polardbx.batchweb.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 密码加密密钥（生产环境请修改）
encrypt:
  secret-key: BatchToolWebSecretKey

# 日志配置
logging:
  level:
    com.alibaba.polardbx: DEBUG
    com.baomidou.mybatisplus: DEBUG

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
